<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="1600" fill="url(#bg)"/>

  <!-- Glow orb -->
  <ellipse cx="600" cy="700" rx="500" ry="400" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="800" x2="1200" y2="800"/>
    <line x1="0" y1="1000" x2="1200" y2="1000"/>
    <line x1="0" y1="1200" x2="1200" y2="1200"/>
    <line x1="0" y1="1400" x2="1200" y2="1400"/>
    <line x1="200" y1="0" x2="200" y2="1600"/>
    <line x1="400" y1="0" x2="400" y2="1600"/>
    <line x1="600" y1="0" x2="600" y2="1600"/>
    <line x1="800" y1="0" x2="800" y2="1600"/>
    <line x1="1000" y1="0" x2="1000" y2="1600"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- Indigo accent stripe left -->
  <rect x="80" y="240" width="4" height="320" fill="url(#accent)" rx="2"/>

  <!-- Lightning bolt icon (large, centered) -->
  <g transform="translate(600, 460)" opacity="0.12">
    <polygon points="-80,160 30,-20 10,-20 80,-160 -30,20 -10,20" fill="#4f46e5"/>
  </g>
  <g transform="translate(600, 460)" opacity="0.9">
    <polygon points="-45,90 16,-12 6,-12 45,-90 -16,12 -6,12" fill="url(#accent)"/>
  </g>

  <!-- Main heading -->
  <text x="88" y="308" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="80" font-weight="900" fill="#ffffff" letter-spacing="-3">MOBILE PT</text>
  <text x="88" y="408" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="80" font-weight="900" fill="#ffffff" letter-spacing="-3">SURVIVAL</text>
  <text x="88" y="508" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="80" font-weight="900" fill="url(#accent)" letter-spacing="-3">GUIDE</text>

  <!-- Divider -->
  <rect x="88" y="548" width="480" height="3" fill="url(#accent)" rx="2"/>

  <!-- Subtitle -->
  <text x="88" y="606" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="30" font-weight="400" fill="#6b7280" letter-spacing="2">URBAN LONDON EDITION</text>

  <!-- Section pills -->
  <g transform="translate(88, 680)">
    <!-- Pill 1 -->
    <rect width="260" height="44" rx="22" fill="#4f46e5" fill-opacity="0.15" stroke="#4f46e5" stroke-opacity="0.4" stroke-width="1"/>
    <text x="130" y="28" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-size="16" font-weight="600" fill="#818cf8" text-anchor="middle">The Gym Trap Warning</text>

    <!-- Pill 2 -->
    <rect y="60" width="290" height="44" rx="22" fill="#4f46e5" fill-opacity="0.15" stroke="#4f46e5" stroke-opacity="0.4" stroke-width="1"/>
    <text x="145" y="88" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-size="16" font-weight="600" fill="#818cf8" text-anchor="middle">E-Bike Logistics Strategy</text>

    <!-- Pill 3 -->
    <rect y="120" width="280" height="44" rx="22" fill="#4f46e5" fill-opacity="0.15" stroke="#4f46e5" stroke-opacity="0.4" stroke-width="1"/>
    <text x="140" y="148" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-size="16" font-weight="600" fill="#818cf8" text-anchor="middle">Weather &amp; Gear Protocol</text>

    <!-- Pill 4 -->
    <rect y="180" width="250" height="44" rx="22" fill="#4f46e5" fill-opacity="0.15" stroke="#4f46e5" stroke-opacity="0.4" stroke-width="1"/>
    <text x="125" y="208" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-size="16" font-weight="600" fill="#818cf8" text-anchor="middle">Park &amp; Space Rules</text>

    <!-- Pill 5 -->
    <rect y="240" width="320" height="44" rx="22" fill="#4f46e5" fill-opacity="0.15" stroke="#4f46e5" stroke-opacity="0.4" stroke-width="1"/>
    <text x="160" y="268" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-size="16" font-weight="600" fill="#818cf8" text-anchor="middle">Finance &amp; Scheduling Playbook</text>
  </g>

  <!-- Large decorative stat -->
  <text x="88" y="1120" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="200" font-weight="900" fill="#ffffff" fill-opacity="0.03" letter-spacing="-10">PT</text>

  <!-- Bottom callout box -->
  <rect x="88" y="1180" width="1024" height="180" rx="16"
        fill="#4f46e5" fill-opacity="0.08" stroke="#4f46e5" stroke-opacity="0.2" stroke-width="1"/>

  <text x="600" y="1252" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="28" font-weight="700" fill="#ffffff" text-anchor="middle">
    "No fluff. No excuses. Just the business tactics
  </text>
  <text x="600" y="1296" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="28" font-weight="700" fill="#818cf8" text-anchor="middle">
    that actually work in the field."
  </text>
  <text x="600" y="1338" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="18" font-weight="400" fill="#6b7280" text-anchor="middle">
    — Brutally honest. Field-tested. London-specific.
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="1524" width="1200" height="76" fill="#4f46e5" fill-opacity="0.06"/>
  <rect x="0" y="1594" width="1200" height="6" fill="url(#accent)"/>
  <text x="88" y="1566" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="20" font-weight="700" fill="#6b7280" letter-spacing="3">PT OPS DASHBOARD</text>
  <text x="1112" y="1566" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="20" font-weight="700" fill="#4f46e5" text-anchor="end">2025</text>
</svg>
